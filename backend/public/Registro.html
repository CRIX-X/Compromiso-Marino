<!DOCTYPE html>
<html>
<head>
    <title>Registro - EcoMar</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>
<body>

<div class="container">
    <h2>Crear Cuenta 🌎</h2>

    <!-- MENSAJES BONITOS -->
    <div id="mensaje" class="mensaje"></div>

    <input type="email" id="email" placeholder="Correo">

    <div class="password-container">
        <input type="password" id="password" placeholder="Contraseña">
        <span id="togglePassword" class="toggle">👁</span>
    </div>

    <!-- CONFIRMAR PASSWORD CON OJO -->
    <div class="password-container">
        <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
        <span id="toggleConfirmPassword" class="toggle">👁</span>
    </div>

    <button id="registerBtn">Registrarse</button>

    <p>¿Ya tienes cuenta? 
        <a href="login.html">Inicia sesión</a>
    </p>

</div>

<script type="module" src="/auth.js"></script>
</body>
</html>
